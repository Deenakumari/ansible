- name: ansible loops
  hosts: frontend
  tasks:
   - name: install ansible packages
     ansible.builtin.packages:
       name: {{ item.name }}
       state: {{ item.state }}
     loop:
       - { name: 'mysql', state: 'present'}
       - { name: 'zip', state: 'present'}
       - { name: 'nginx', state: 'present'}