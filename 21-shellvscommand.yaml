- name: shell vs command
  hosts: frontend
  tasks:
    - name: redirect the ls output
      ansble.builtin.command: "ls -ltr > /tmp/output.txt"
      # ansbile.builtin.shell: "ls -ltr > /tmp/output.txt"
      register: command_result

    - name: print the command outcome
      ansible.builtin.debug:
      msg: "{{ command_result }}" 

    - name: redirect ls output to the shell
      # ansbile.builtin.command: " ls -ltr > /tmp/output.txt"
      ansbile.builtin.shell: "ls -ltr > /tmp/output.txt"
      register: command_output

    - name: print output 
      ansbile.builtin.debug:
      msg: "{{ command_output }}"
      
