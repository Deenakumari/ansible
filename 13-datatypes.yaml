- name: ansible data types
  hosts: local
  connection: local
  vars:
    duration: 120 hrs
    course: devops
    is_live: true
    tools:
      - cicd
      - linux
      - shell
    concepts:
      ci: jemkins
      script: shell,ansible,terraform
  tasks:
    - name: print the course info
      ansible.builtin.debug:
       msg: "the course durstion is {{ duration }}, course is: {{ course }}, is_live? {{ is_live }}, tools are: {{ tools }}, concepts are: {{ concepts }}" 