- name: ansible conditions
  hosts: local
  connection: local
  tasks:
    - name: install nginx if redhat
      ansible.builtin.dnf:
        name: nginx
        state: present
      when: ansible_os_family == "redhat"

    - name: install nginx if debian
      ansible.builtin.apt:
        name: nginx
        state: present
      when: ansible_os_family == "debian"
